name: Discord Report

on:
  schedule:
    # Runs at 3:12 AM UTC (8:42 AM Sri Lanka time, UTC+5:30)
    # Format: minute hour day month day-of-week
    - cron: '12 3 * * 1-5'  # Monday to Friday
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  send-report:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run Clockify bot
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          FULL_TIME_ANNOUNCEMENTS_CHANNEL_ID: ${{ secrets.FULL_TIME_ANNOUNCEMENTS_CHANNEL_ID }}
          PROJECT_MANAGEMENT_CHANNEL_ID: ${{ secrets.PROJECT_MANAGEMENT_CHANNEL_ID }}
          CLOCKIFY_API_KEY: ${{ secrets.CLOCKIFY_API_KEY }}
          CLOCKIFY_WORKSPACE_ID: ${{ secrets.CLOCKIFY_WORKSPACE_ID }}
          GENERAL_CHANNEL_ID: ${{ secrets.GENERAL_CHANNEL_ID }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            node trigger.js
          else
            node index.js
          fi